<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ghostties</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0e0e10;
      color: #e8e4df;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      padding: 2rem;
    }

    .four-oh-four {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #c97350;
    }

    .tagline {
      margin-top: 1.25rem;
      font-size: 1.125rem;
      font-weight: 400;
      color: #8a857f;
      letter-spacing: 0.01em;
    }

    .more {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: #5a5650;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="four-oh-four">404</div>
    <p class="tagline">We're made on 404, coming soon.</p>
    <p class="more">More soon.</p>
  </div>
</body>
</html>
